const letters = ["ก", "ข", "ค", "ง"];
let current = 0;
let userAnswers = [];

function renderQuiz() {
  const area = document.getElementById("quizArea");
  area.innerHTML = "";

  quizData.forEach((q, i) => {
    const card = document.createElement("div");
    card.className = "card" + (i === 0 ? " active" : "");
    card.id = "card-" + i;

    let optionsHTML = q.options.map((opt, j) =>
      `<div class="option" onclick="selectAnswer(${i}, ${j})" id="opt-${i}-${j}">
        <div class="letter">${letters[j]}</div>
        <span>${opt.text}</span>
      </div>`
    ).join("");

    card.innerHTML = `
      <div class="question-number">ข้อที่ ${i + 1}</div>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHTML}</div>

      <button class="btn-next" id="btn-${i}" onclick="nextQuestion(${i})">
        ${i < quizData.length - 1 ? "ข้อถัดไป →" : "ดูผลลัพธ์ →"}
      </button>
    `;

    area.appendChild(card);
  });

  updateProgress();
}

function startQuiz() {
  document.getElementById("landingCard").classList.remove("active");
  document.getElementById("progressArea").style.display = "block";
  renderQuiz();
}

function selectAnswer(qIndex, optIndex) {
  const q = quizData[qIndex];
  const options = document.querySelectorAll(`#card-${qIndex} .option`);
  const btn = document.getElementById(`btn-${qIndex}`);

  // Disable all options
  options.forEach(o => o.classList.add("disabled"));

  userAnswers[qIndex] = optIndex;

  options[optIndex].classList.add("selected");
  btn.classList.add("show");
}

function nextQuestion(qIndex) {
  const currentCard = document.getElementById("card-" + qIndex);
  currentCard.classList.remove("active");

  if (qIndex < quizData.length - 1) {
    current = qIndex + 1;
    const nextCard = document.getElementById("card-" + current);
    nextCard.classList.add("active");
    updateProgress();
  } else {
    showResult();
  }
}

function updateProgress() {
  document.getElementById("currentQ").textContent = current + 1;
  document.getElementById("progressFill").style.width = ((current + 1) / quizData.length * 100) + "%";
}

function showResult() {
  document.getElementById("progressArea").style.display = "none";

  const card = document.getElementById("resultCard");
  card.classList.add("active");

  // Sum scores across all answers
  const totals = [0, 0, 0, 0, 0, 0, 0, 0, 0];
  userAnswers.forEach((optIdx, qIdx) => {
    if (optIdx !== undefined) {
      const scores = quizData[qIdx].options[optIdx].scores;
      scores.forEach((s, i) => { totals[i] += s; });
    }
  });

  const maxScore = Math.max(...totals);
  const topIndex = totals.indexOf(maxScore);

  const p = personalities[topIndex];
  document.getElementById("resultIcon").textContent = p.icon;
  document.getElementById("resultScore").textContent = p.title;
  document.getElementById("resultLabel").textContent = p.label;
  document.getElementById("resultMsg").textContent = p.msg;
}

function restartQuiz() {
  current = 0;
  userAnswers = [];

  document.getElementById("resultCard").classList.remove("active");
  document.getElementById("quizArea").innerHTML = "";
  document.getElementById("landingCard").classList.add("active");
}

</script>
